name: Build Pi image

# Manual-only. Run from Actions → "Build Pi image" → Run workflow.
# Tag pushes used to auto-trigger this; we removed that to keep the
# workflow under explicit control. Two inputs:
#   * version         — the version string to bake into the image's
#                       filename. Defaults to pi-image/VERSION.
#   * publish_release — if checked, also creates a GitHub Release named
#                       "Cold Fusion Sight v<version>" with the .img.xz
#                       attached. Off by default — you'll usually want
#                       to verify the artifact downloads cleanly first
#                       and then re-run with the box checked.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 0.1.0). Leave blank to read pi-image/VERSION.'
        required: false
        default: ''
      publish_release:
        description: 'Also publish a GitHub Release with the image attached'
        required: false
        type: boolean
        default: false

# pi-gen needs root for losetup / chroot etc. The hosted ubuntu-latest
# runner gives us passwordless sudo, which is exactly what build.sh
# expects.
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    # action-gh-release needs `contents: write` to actually publish a
    # Release. Default GITHUB_TOKEN scope is read-only on workflows
    # that aren't tag/push triggered, so we have to ask for it
    # explicitly here.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="$(cat pi-image/VERSION 2>/dev/null || echo 0.0.0-dev)"
          fi
          # Strip any leading 'v' so we get cfsight-0.1.0, not cfsight-v0.1.0
          VER="${VER#v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Building cfsight-$VER"

      - name: Install host build deps
        # We build via pi-gen's Docker path (build-docker.sh), so all
        # of pi-gen's heavy chroot deps live inside its Docker image
        # and don't need to be on the host. We just install our
        # wrapper script's own deps.
        run: |
          sudo apt-get update
          sudo apt-get install -y git rsync xz-utils
          docker --version
          sudo systemctl is-active docker || sudo systemctl start docker

      - name: Register qemu binfmt handlers on the host kernel
        # pi-gen's chroot tries to execute aarch64 binaries (apt, dpkg,
        # debconf etc.). The Linux kernel needs to know "ah, this is
        # foreign-arch, route it through qemu-aarch64-static" — that's
        # binfmt_misc registration. On older Debian/Ubuntu the
        # `qemu-user-binfmt` apt package handled this, but on Ubuntu
        # 24.04 it conflicts with `qemu-user-static`, so we can't
        # install both. The multiarch/qemu-user-static Docker image
        # registers binfmt handlers via the kernel's binfmt_misc
        # interface without needing either apt package — works on
        # every modern Linux host and ALSO works inside CI runners
        # that don't have the apt packages.
        run: |
          docker run --rm --privileged multiarch/qemu-user-static:latest \
              --reset -p yes
          # Sanity-check: the kernel should now have an entry for
          # qemu-aarch64. If this is empty, pi-gen's chroot will fail
          # when it tries to apt-install inside the rootfs.
          ls /proc/sys/fs/binfmt_misc/ | grep -E "qemu-aarch64|aarch64" || true
          cat /proc/sys/fs/binfmt_misc/qemu-aarch64 2>/dev/null || true

      - name: Free up disk on the runner
        # ubuntu-latest comes with ~14 GB free which is *just barely*
        # enough for a Bookworm Lite arm64 build. Reclaim a few GB by
        # nuking the bloated stuff GitHub pre-installs that we don't
        # need (Android SDK, .NET, ghc, big browser caches).
        run: |
          sudo rm -rf /usr/local/lib/android \
                      /usr/share/dotnet \
                      /opt/ghc \
                      /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost
          df -h /

      - name: Build image
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          chmod +x pi-image/build.sh
          ./pi-image/build.sh

      - name: Show output
        run: |
          ls -la pi-image/out/
          (cd pi-image/out && sha256sum *.img.xz > SHA256SUMS.txt && cat SHA256SUMS.txt)

      # Always upload as a workflow artifact (kept ~90 days). This is
      # the primary deliverable — every successful run yields a
      # downloadable image whether or not the user opted into a
      # Release.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfsight-${{ steps.ver.outputs.version }}-arm64
          path: |
            pi-image/out/*.img.xz
            pi-image/out/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90

      # Optional: publish a public Release. Only fires when the operator
      # checks the publish_release input. We tag the Release as
      # v<version> ourselves so we don't depend on a separate `git tag`
      # step on the user's laptop.
      - name: Publish Release
        if: ${{ github.event.inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Cold Fusion Sight v${{ steps.ver.outputs.version }}
          body: |
            **Vision Pi image** — flash with Raspberry Pi Imager
            (Use custom image → select the `.img.xz` below).

            See `pi-image/README.md` for first-boot setup instructions.

            ## Verify
            ```
            sha256sum -c SHA256SUMS.txt
            ```
          files: |
            pi-image/out/*.img.xz
            pi-image/out/SHA256SUMS.txt
          draft: false
          prerelease: false
