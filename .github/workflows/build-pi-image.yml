name: Build Pi image

# Manual-only. Run from Actions → "Build Pi image" → Run workflow.
# Tag pushes used to auto-trigger this; we removed that to keep the
# workflow under explicit control. Two inputs:
#   * version         — the version string to bake into the image's
#                       filename. Defaults to pi-image/VERSION.
#   * publish_release — if checked, also creates a GitHub Release named
#                       "Cold Fusion Sight v<version>" with the .img.xz
#                       attached. Off by default — you'll usually want
#                       to verify the artifact downloads cleanly first
#                       and then re-run with the box checked.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 0.1.0). Leave blank to read pi-image/VERSION.'
        required: false
        default: ''
      publish_release:
        description: 'Also publish a GitHub Release with the image attached'
        required: false
        type: boolean
        default: false

# pi-gen needs root for losetup / chroot etc. The hosted ubuntu-latest
# runner gives us passwordless sudo, which is exactly what build.sh
# expects.
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    # action-gh-release needs `contents: write` to actually publish a
    # Release. Default GITHUB_TOKEN scope is read-only on workflows
    # that aren't tag/push triggered, so we have to ask for it
    # explicitly here.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="$(cat pi-image/VERSION 2>/dev/null || echo 0.0.0-dev)"
          fi
          # Strip any leading 'v' so we get cfsight-0.1.0, not cfsight-v0.1.0
          VER="${VER#v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Building cfsight-$VER"

      - name: Install host build deps
        # Pi-gen's build-docker.sh has TWO checks before it'll run:
        #   1. /usr/bin/qemu-aarch64-static must be on the host PATH
        #      (that's what `qemu-user-static` provides).
        #   2. /proc/sys/fs/binfmt_misc/qemu-aarch64 must exist on the
        #      host kernel (binfmt registration; we do that in the
        #      next step via tonistiigi/binfmt).
        # On Ubuntu 24.04 the `qemu-user-binfmt` apt package conflicts
        # with `qemu-user-static`, so we install ONLY the static one
        # and handle binfmt registration via the docker container.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git rsync xz-utils \
            qemu-user-static
          docker --version
          sudo systemctl is-active docker || sudo systemctl start docker
          # Confirm the binary pi-gen will look for is reachable.
          which qemu-aarch64-static
          qemu-aarch64-static --version | head -1

      - name: Register qemu binfmt handlers on the host kernel
        # tonistiigi/binfmt is the de-facto standard for "register
        # cross-arch QEMU handlers in CI" — it's what Docker Buildx
        # uses under the hood, and it works without needing either of
        # the conflicting apt packages. After this step the kernel
        # has /proc/sys/fs/binfmt_misc/qemu-aarch64 pointing at
        # /usr/bin/qemu-aarch64-static (which we just installed
        # above), and pi-gen's chroot can transparently execute
        # aarch64 binaries during apt/dpkg.
        run: |
          docker run --rm --privileged tonistiigi/binfmt:latest --install all
          # Hard-fail here if the registration didn't take — much
          # better than letting the build run for 5 min and then
          # failing inside pi-gen with the same error.
          test -e /proc/sys/fs/binfmt_misc/qemu-aarch64 \
              || (echo "binfmt qemu-aarch64 NOT registered" >&2; \
                  ls /proc/sys/fs/binfmt_misc/; exit 1)
          echo "binfmt entries:"
          ls /proc/sys/fs/binfmt_misc/ | sort
          echo "qemu-aarch64 registration:"
          cat /proc/sys/fs/binfmt_misc/qemu-aarch64

      - name: Free up disk on the runner
        # ubuntu-latest comes with ~14 GB free which is *just barely*
        # enough for a Bookworm Lite arm64 build. Reclaim a few GB by
        # nuking the bloated stuff GitHub pre-installs that we don't
        # need (Android SDK, .NET, ghc, big browser caches).
        run: |
          sudo rm -rf /usr/local/lib/android \
                      /usr/share/dotnet \
                      /opt/ghc \
                      /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost
          df -h /

      - name: Build image
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          chmod +x pi-image/build.sh
          ./pi-image/build.sh

      - name: Show output
        run: |
          ls -la pi-image/out/
          (cd pi-image/out && sha256sum *.img.xz > SHA256SUMS.txt && cat SHA256SUMS.txt)

      # Always upload as a workflow artifact (kept ~90 days). This is
      # the primary deliverable — every successful run yields a
      # downloadable image whether or not the user opted into a
      # Release.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfsight-${{ steps.ver.outputs.version }}-arm64
          path: |
            pi-image/out/*.img.xz
            pi-image/out/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90

      # Optional: publish a public Release. Only fires when the operator
      # checks the publish_release input. We tag the Release as
      # v<version> ourselves so we don't depend on a separate `git tag`
      # step on the user's laptop.
      - name: Publish Release
        if: ${{ github.event.inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Cold Fusion Sight v${{ steps.ver.outputs.version }}
          body: |
            **Vision Pi image** — flash with Raspberry Pi Imager
            (Use custom image → select the `.img.xz` below).

            See `pi-image/README.md` for first-boot setup instructions.

            ## Verify
            ```
            sha256sum -c SHA256SUMS.txt
            ```
          files: |
            pi-image/out/*.img.xz
            pi-image/out/SHA256SUMS.txt
          draft: false
          prerelease: false
