# Acuity Manager — release builds.
#
# Triggers:
#   * tag push matching `manager-v*`  → full release: builds the
#     Windows installer + portable EXE, publishes to GitHub Releases.
#     The published `latest.yml` + `*.exe.blockmap` files are what
#     electron-updater (in the running app) checks against to know
#     a new version is available.
#   * workflow_dispatch              → manual one-off build, no
#     publish. Useful for "does it still build" sanity checks.
#
# Note on signing: we ship UNSIGNED binaries on purpose. Windows
# SmartScreen will warn the user on first install and on each
# update. Signing requires a $200/yr cert which we'll add later.

name: manager-release

on:
  push:
    tags:
      - 'manager-v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases?'
        type: boolean
        default: false

permissions:
  contents: write   # needed to create releases + upload assets

jobs:
  build-windows:
    name: Windows — build${{ (startsWith(github.ref, 'refs/tags/manager-v') || inputs.publish) && ' + publish' || '' }}
    runs-on: windows-latest
    defaults:
      run:
        working-directory: acuity/manager
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: acuity/manager/package-lock.json

      # Cache the electron-builder downloaded electron / wine binaries
      # to keep cold-CI builds under 5 minutes.
      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('acuity/manager/package.json') }}
          restore-keys: ${{ runner.os }}-electron-

      - name: Install deps
        # `npm ci` requires a package-lock; if there isn't one yet,
        # fall back to `npm install` so the first ever workflow run
        # doesn't fail before we've checked in a lock.
        run: |
          if (Test-Path package-lock.json) { npm ci } else { npm install --no-audit --fund=false }
        shell: pwsh

      - name: Build NSIS installer + portable EXE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code signing — we don't have a Windows cert.
          # electron-builder honors these env vars to bypass signing.
          CSC_LINK: ''
          CSC_KEY_PASSWORD: ''
          WIN_CSC_LINK: ''
          WIN_CSC_KEY_PASSWORD: ''
        run: |
          if ('${{ github.ref_type }}' -eq 'tag' -or '${{ inputs.publish }}' -eq 'true') {
            npm run release:win
          } else {
            npm run build:win
          }
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manager-windows
          # electron-builder drops everything under acuity/manager/dist/.
          path: |
            acuity/manager/dist/*.exe
            acuity/manager/dist/*.exe.blockmap
            acuity/manager/dist/latest.yml
          if-no-files-found: error
