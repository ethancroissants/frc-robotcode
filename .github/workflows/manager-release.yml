# Acuity Manager — release builds.
#
# Triggers:
#   * tag push matching `manager-v*`  → full release: builds the
#     Windows installer + portable EXE, publishes to GitHub Releases.
#     The published `latest.yml` + `*.exe.blockmap` files are what
#     electron-updater (in the running app) checks against to know
#     a new version is available.
#   * workflow_dispatch              → manual one-off build, no
#     publish. Useful for "does it still build" sanity checks.
#
# Note on signing: we ship UNSIGNED binaries on purpose. Windows
# SmartScreen warns the user on first install and on each update.
# Signing would need a $200/yr cert; deferred until the volume
# justifies it.
#
# Note on caching: we deliberately don't pass `cache: 'npm'` to
# setup-node. That option requires a checked-in package-lock.json
# *before* the workflow starts and hard-errors on a fresh repo
# ("Some specified paths were not resolved, unable to cache
# dependencies"). We do our own actions/cache step further down
# that gracefully degrades to a cold install when there's no lock.

name: manager-release

on:
  push:
    tags:
      - 'manager-v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases?'
        type: boolean
        default: false

permissions:
  contents: write   # needed to create releases + upload assets

jobs:
  build-windows:
    name: Windows build${{ (startsWith(github.ref, 'refs/tags/manager-v') || inputs.publish) && ' + publish' || '' }}
    runs-on: windows-latest
    defaults:
      run:
        working-directory: acuity/manager

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Intentionally NO `cache: 'npm'` — see header note.

      # node-gyp (which node-pty's native build invokes) ships an older
      # `gyp` that imports `distutils.version.StrictVersion`. Python 3.12
      # deprecated distutils, Python 3.13 removed it. windows-latest now
      # defaults to Python 3.13 → `ModuleNotFoundError: No module named
      # 'distutils'` mid-build. Pin Python 3.11 — last version that
      # ships distutils in stdlib — and put it on PATH for node-gyp to
      # discover.
      - name: Set up Python 3.11 (for node-gyp / node-pty native build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # === Cache layers (fast → slow) ===
      #
      # The biggest win is caching node_modules directly: without it
      # npm install takes ~2 minutes for ~400 packages every run.
      # Cache hit → npm install skipped entirely.
      #
      # Cache key includes Node major version (in case we bump it),
      # the OS, and a hash of package.json. We also include
      # package-lock.json's hash IF it exists — when it does the
      # cache becomes lockfile-precise; when it doesn't the
      # restore-keys fallback finds the most recent compatible
      # cache.
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: acuity/manager/node_modules
          key: ${{ runner.os }}-node20-modules-${{ hashFiles('acuity/manager/package.json', 'acuity/manager/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-modules-

      # Cache npm's tarball cache too — used as a fallback when
      # node_modules cache misses but some package versions match.
      # npm install in that case is still much faster than cold.
      - name: Cache npm tarballs
        uses: actions/cache@v4
        with:
          path: ~\AppData\Roaming\npm-cache
          key: ${{ runner.os }}-npmcache-${{ hashFiles('acuity/manager/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npmcache-

      # Cache the prebuilt Electron download + electron-builder's
      # extracted NSIS / app-builder binaries. Big — ~150 MB combined
      # — but downloaded over a fast GitHub-Actions network and
      # extracted, so even a cold restore beats cold download by a
      # lot. Key on Electron version (read from package.json) so a
      # major Electron bump invalidates cleanly.
      - name: Cache Electron + electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('acuity/manager/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        # Three paths in priority order:
        #   1. node_modules cache hit → skip install entirely (saves ~2 min).
        #   2. lockfile exists        → `npm ci` (reproducible, fast).
        #   3. fresh repo, no lock    → `npm install` (slowest path).
        # We pass --prefer-offline so npm tries the local tarball
        # cache before reaching out to the registry.
        run: |
          if ('${{ steps.cache-node-modules.outputs.cache-hit }}' -eq 'true') {
            Write-Host "node_modules cache HIT — skipping install"
          } elseif (Test-Path package-lock.json) {
            Write-Host "node_modules cache MISS, lockfile present — npm ci"
            npm ci --no-audit --fund=false --prefer-offline
          } else {
            Write-Host "node_modules cache MISS, no lockfile — npm install"
            npm install --no-audit --fund=false --prefer-offline
          }
        shell: pwsh

      - name: Sync version from tag
        # When triggered by a `manager-vX.Y.Z` tag, force-set
        # package.json's version to X.Y.Z so:
        #   1. the installer filename matches the tag
        #   2. electron-builder publishes to a Release whose tag the
        #      currently-installed binary's app.getVersion() can match
        #      against (electron-updater compares semver).
        # Skipped on workflow_dispatch — keep whatever's in source.
        if: github.ref_type == 'tag'
        run: |
          $tag = '${{ github.ref_name }}'
          $version = $tag -replace '^manager-v', ''
          Write-Host "tag $tag → version $version"
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $version
          # ConvertTo-Json's default depth (2) truncates electron-builder's
          # nested `build` config; bump it to keep everything intact.
          $pkg | ConvertTo-Json -Depth 32 | Set-Content -NoNewline package.json
          Write-Host "package.json version is now $((Get-Content package.json -Raw | ConvertFrom-Json).version)"
        shell: pwsh

      - name: Build (and publish on tags)
        env:
          # GH_TOKEN is what electron-builder reads to publish to
          # Releases. The default GITHUB_TOKEN has the right perms
          # because we declared `permissions.contents: write` above.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code signing — we don't have a Windows cert. Set
          # blank values so electron-builder doesn't probe for one.
          CSC_LINK: ''
          CSC_KEY_PASSWORD: ''
          WIN_CSC_LINK: ''
          WIN_CSC_KEY_PASSWORD: ''
        run: |
          $isTag = '${{ github.ref_type }}' -eq 'tag'
          $manualPublish = '${{ inputs.publish }}' -eq 'true'
          if ($isTag -or $manualPublish) {
            Write-Host "publishing to GitHub Releases"
            npm run release:win
          } else {
            Write-Host "build-only (no publish)"
            npm run build:win
          }
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: acuity-manager-windows
          # electron-builder drops everything under acuity/manager/dist/.
          # The blockmap + latest.yml are what electron-updater needs.
          path: |
            acuity/manager/dist/*.exe
            acuity/manager/dist/*.exe.blockmap
            acuity/manager/dist/latest.yml
          if-no-files-found: error
