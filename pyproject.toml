[tool.robotpy]

# Version of robotpy this project depends on
robotpy_version = "2026.2.2"

# Which packages to install on the roboRIO. Developer-machine tools (e.g.
# tkinter for `setup.py --ui` / `deploy.py --ui`) do NOT belong here — that
# section only ships to the robot. tkinter is a Python stdlib module that
# must be installed at the OS level (Homebrew: `brew install python-tk`,
# Debian/Ubuntu: `sudo apt-get install python3-tk`); setup.py checks for it
# and offers to install it when a package manager is detected.
requires = [
    "robotpy-commands-v2",
    "phoenix6",
    "robotpy-pathplannerlib",
    # grapplefrc: vendor SDK for the Grapple Robotics LaserCAN sensor.
    # TEMPORARILY DISABLED — Grapple has no Python 3.14 wheel on PyPI yet
    # (latest is 2027.0.0a2 capped at Requires-Python <3.14, but RobotPy 2026
    # requires 3.14). Re-enable once a 3.14-compatible release ships.
    # The LaserCanSubsystem already no-ops when the import fails, so AutoAim
    # falls back to AprilTag-PnP range rather than the active sensor.
    # "grapplefrc",
    # cscore + numpy stay in the requires list because tests / sim still
    # reference vision.py; the rio no longer publishes a stream itself.
    "robotpy-cscore",
    "numpy",
]
